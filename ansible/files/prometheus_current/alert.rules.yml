        annotations:
          summary: "MikroTik qmir is missing"
          description: "No identity metrics for qmir / qmir for more than 5 minutes."

      - alert: MikroTikRouterMissing
        expr: absent_over_time(mktxp_system_identity_info{site="storis",routerboard_name="storis"}[5m])
        for: 1m
