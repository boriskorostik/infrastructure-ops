          description: "No identity metrics for zalive / zalive for more than 5 minutes."

      - alert: MikroTikRouterMissing
        expr: absent_over_time(mktxp_system_identity_info{site="qmir",routerboard_name="qmir"}[5m])
        for: 1m
        labels:
          severity: critical
          site: qmir
