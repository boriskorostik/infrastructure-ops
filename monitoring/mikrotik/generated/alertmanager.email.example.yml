global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'mikrotik-alerts@example.com'
  smtp_auth_username: 'mikrotik-alerts@example.com'
  smtp_auth_password: 'APP_PASSWORD_HERE'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'instance', 'routerboard_name']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram-and-email'

receivers:
  - name: 'telegram-and-email'
    telegram_configs:
      - bot_token: 'TELEGRAM_BOT_TOKEN_HERE'
        chat_id: 4936201520
        send_resolved: true
        message: '{{ template "telegram.default.message" . }}'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true
        headers:
          subject: '{{ if eq .Status "firing" }}ALERT{{ else }}RESOLVED{{ end }} {{ .CommonLabels.alertname }} {{ .CommonLabels.routerboard_name }}'
        html: '{{ template "email.default.html" . }}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'
