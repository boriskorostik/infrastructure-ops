server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: mikrotik
  static_configs:
  - targets:
      - localhost
    labels:
      job: mikrotik
      __path__: /var/log/mikrotik/*/*.log
  pipeline_stages:
  - regex:
      expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<host>\S+)\s+(?P<message>.*)'
  - labels:
      host:
